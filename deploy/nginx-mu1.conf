# Дополнительный server-блок для mu1.projectoblivion.xyz.
# Должен быть включён внутрь существующего http { ... } в checkron nginx.
# См. deploy/README.md для шагов установки.

# HTTP — редирект + ACME challenge для certbot
server {
    listen 80;
    server_name mu1.projectoblivion.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — webhook proxy → muagent-hub:8080
server {
    listen 443 ssl;
    http2 on;
    server_name mu1.projectoblivion.xyz;

    ssl_certificate     /etc/letsencrypt/live/mu1.projectoblivion.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mu1.projectoblivion.xyz/privkey.pem;
    ssl_session_cache shared:SSL_MU1:10m;
    ssl_session_timeout 1d;

    location /webhook {
        proxy_pass http://muagent-hub:8080/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # webhook от Telegram приходит как POST с JSON, ничего особого не нужно
        proxy_read_timeout 60s;
    }

    # health-check для отладки
    location = /health {
        return 200 "muagent ok\n";
        add_header Content-Type text/plain;
    }
}
